services:
  - type: web
    name: vidyapath-api
    env: python
    buildCommand: pip install -r requirements.txt && python -m backend.rag.ingest
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
