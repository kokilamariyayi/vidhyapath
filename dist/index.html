<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidyaPath - Career Guidance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">🎓</span> VidyaPath
        </div>

        <div class="sidebar-section">
            <p class="sidebar-label" data-i18n="Select Language">Select Language</p>
            <select id="lang-select" class="lang-select">
                <option value="en">English</option>
                <option value="ta">Tamil (தமிழ்)</option>
                <option value="hi">Hindi (हिंदी)</option>
                <option value="te">Telugu (తెలుగు)</option>
                <option value="kn">Kannada (ಕನ್ನಡ)</option>
                <option value="ml">Malayalam (മലയാളം)</option>
                <option value="mr">Marathi (मराठी)</option>
            </select>
        </div>

        <div class="sidebar-section">
            <p class="sidebar-label" data-i18n="Try asking">Try asking</p>
            <div id="quick-questions" class="quick-questions">
                <button class="quick-btn" data-query="What can I study after 12th?" data-i18n="What can I study after 12th?">What can I study after 12th?</button>
                <button class="quick-btn" data-query="Are there any schemes for women entrepreneurs?" data-i18n="Schemes for women entrepreneurs?">Schemes for women entrepreneurs?</button>
                <button class="quick-btn" data-query="Best job portals for freshers?" data-i18n="Best job portals for freshers?">Best job portals for freshers?</button>
                <button class="quick-btn" data-query="Scholarships for Class 10?" data-i18n="Scholarships for Class 10?">Scholarships for Class 10?</button>
            </div>
        </div>

        <div style="margin-top: auto;">
            <button id="clear-chat" class="quick-btn" style="width: 100%; border-color: rgba(239, 68, 68, 0.3); color: #f87171;" data-i18n="Clear Chat History">
                🗑️ Clear Chat History
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="chat-header">
            <div>
                <h1 style="font-size: 1.1rem; font-weight: 600;" data-i18n="AI Career Co-pilot">AI Career Co-pilot</h1>
                <p id="status-indicator" style="font-size: 0.75rem; color: var(--accent-emerald);" data-i18n="Online">● Online</p>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <span id="detected-lang" class="emotion-tag" style="background: rgba(171, 71, 188, 0.1); color: #ab47bc;">EN</span>
            </div>
        </header>

        <section id="chat-messages" class="chat-messages">
            <div class="message bot" data-i18n="👋 Namaste! I'm VidyaPath. I can help you with career guidance, scholarships, and government schemes. What's on your mind today?">
                👋 Namaste! I'm VidyaPath. I can help you with career guidance, scholarships, and government schemes. What's on your mind today?
            </div>
        </section>

        <section class="input-area">
            <div class="input-container">
                <input type="text" id="chat-input" placeholder="Type your question here..." autocomplete="off">
                <button id="send-btn" class="send-btn" data-i18n="Send">Send</button>
            </div>
        </section>
    </main>

    <aside class="profile-panel">
        <h2 style="font-size: 1rem; margin-bottom: 1.5rem;" data-i18n="Student Profile">👤 Student Profile</h2>
        <div id="profile-container">
            <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: 2rem;" data-i18n="Chat with me to build your profile!">
                Chat with me to build your profile!
            </p>
        </div>
    </aside>

    <script src="script.js?v=1.1.6"></script>
</body>
</html>
